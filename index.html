<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:#f0f0f0;
overflow-x:hidden;
}

/* Startseite */

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:50px;

background-image:url("Startseiten.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Überschrift */

h1{
font-size:90px;
margin-top:20px;
color:white;
text-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* 3D Buttons */

.startButton{

font-size:48px;
font-weight:700;
color:white;

padding:30px 60px;

border-radius:20px;
border:none;

cursor:pointer;

box-shadow:
0 8px 0 rgba(0,0,0,0.4),
0 12px 20px rgba(0,0,0,0.4);

transition:0.15s;

width:auto;
}

.startButton:active{
transform:translateY(6px);
box-shadow:
0 2px 0 rgba(0,0,0,0.4);
}

/* Farben */

.learnBtn{background:#2ecc71;}
.quizBtn{background:#3498db;}
.expertBtn{background:#e74c3c;}

/* Game Bereich */

#game{
display:none;
padding-top:20px;
}

/* große Steuerbuttons */

.bigButton{

font-size:36px;
font-weight:700;

padding:25px 50px;

border-radius:18px;
border:none;

background:#444;
color:white;

cursor:pointer;

box-shadow:
0 6px 0 rgba(0,0,0,0.4),
0 8px 18px rgba(0,0,0,0.3);

margin:20px;

}

.bigButton:active{
transform:translateY(4px);
box-shadow:0 2px 0 rgba(0,0,0,0.4);
}

/* Container */

.container{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));

gap:40px;
width:90%;
margin:auto;
margin-top:40px;

}

/* Quizkarten */

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,0.2);

cursor:pointer;

}

.card img{

width:100%;
height:240px;
object-fit:contain;

}

.name{

font-size:32px;
font-weight:700;

}

/* Expertenmodus Buttons */

.expertButton{

font-size:44px;
font-weight:700;

padding:50px;

border-radius:18px;
border:none;

background:#e74c3c;
color:white;

cursor:pointer;

box-shadow:
0 6px 0 rgba(0,0,0,0.4),
0 8px 18px rgba(0,0,0,0.3);

}

.expertButton:active{
transform:translateY(4px);
}

/* Punkte */

#points{

font-size:60px;
font-weight:700;

margin-top:20px;

}

/* Fortschrittsbalken */

.progressContainer{

width:90%;
height:70px;

background:#ddd;

border-radius:40px;

margin:30px auto;

overflow:hidden;

box-shadow:inset 0 3px 8px rgba(0,0,0,0.3);

}

.progressBar{

height:100%;
width:0%;

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* Info */

#info{
font-size:36px;
height:40px;
}

/* Endscreen */

#endScreen{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#f0f0f0;

justify-content:center;
align-items:center;
flex-direction:column;

}

#finalScore{

font-size:80px;

}

#rating{

font-size:50px;

}

#nameInput{

font-size:30px;

padding:15px;

width:300px;

border-radius:10px;

border:1px solid #ccc;

}

/* Konfetti */

.confetti{

position:fixed;

width:10px;
height:10px;

top:-10px;

animation:fall 3s linear forwards;

}

@keyframes fall{

0%{transform:translateY(0) rotate(0);}

100%{transform:translateY(110vh) rotate(720deg);}

}

</style>

</head>

<body>

<div id="startScreen">

<h1>🐦 Vogelstimmen Trainer</h1>

<button class="startButton learnBtn" onclick="startGame('learn')">
Lernen
</button>

<button class="startButton quizBtn" onclick="startGame('quiz')">
Quiz
</button>

<button class="startButton expertBtn" onclick="startGame('expert')">
Expertenmodus
</button>

</div>

<div id="game">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button>

<button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button id="saveBtn" class="bigButton" onclick="saveScore()">
Score speichern
</button>

<div id="highscores"></div>

<button class="bigButton" onclick="location.reload()">
Nochmal spielen
</button>

</div>

<script>

function capitalize(text){
return text.charAt(0).toUpperCase()+text.slice(1);
}

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

createBirdCards();

}

function goBack(){

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createBirdCards(){

let container=document.getElementById("birdContainer");

container.innerHTML="";

birds.forEach(bird=>{

let name=capitalize(bird.name);

if(mode==="expert"){

let btn=document.createElement("button");

btn.className="expertButton";

btn.innerText=name;

btn.onclick=()=>birdClicked(bird.name);

container.appendChild(btn);

}

else{

let card=document.createElement("div");

card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+name+"</div>";

card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

}

});

}

function playRandomSound(){

let randomIndex=Math.floor(Math.random()*birds.length);

currentBird=birds[randomIndex].name;

}

function repeatSound(){}

function birdClicked(bird){

rounds++;

if(bird===currentBird){

points++;

document.getElementById("info").innerHTML="✅ Richtig";

}

else{

document.getElementById("info").innerHTML="❌ Falsch";

}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){

endGame();

}

}

function endGame(){

launchConfetti();

document.getElementById("game").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Punkte: "+points+" / "+maxRounds;

}

function launchConfetti(){

let colors=["#ff0000","#ffcc00","#00ccff","#66ff66","#ff66cc"];

for(let i=0;i<120;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=colors[Math.floor(Math.random()*colors.length)];

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),4000);

}

}

</script>

</body>
</html>
