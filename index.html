<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background:#f0f0f0;
}

/* ===================== */
/* STARTSEITE */
/* ===================== */

#startScreen{

height:100vh;
width:100%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

gap:35px;

background-image:url("Startseite.png");
background-size:cover;
background-position:center;

}

/* Buttons */

.modeButton{

width:auto;
min-width:220px;

font-size:42px;
font-weight:700;

padding:25px 45px;

border:none;
border-radius:25px;

color:white;

cursor:pointer;

box-shadow:
0 8px 0 rgba(0,0,0,0.35),
0 18px 25px rgba(0,0,0,0.4);

transition:all 0.15s ease;

}

.modeButton:active{
transform:translateY(6px);
}

.learnBtn{
background:linear-gradient(#4cc76a,#2e9c47);
}

.quizBtn{
background:linear-gradient(#4d8dff,#2e62d6);
}

.expertBtn{
background:linear-gradient(#ff5c5c,#c72b2b);
}

/* Steuerbuttons */

.bigButton{

font-size:30px;

padding:18px 30px;

border:none;
border-radius:18px;

background:#333;
color:white;

cursor:pointer;

margin:15px;

}

/* ===================== */
/* GRID */
/* ===================== */

.container{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

width:95%;

margin:auto;
margin-top:20px;

}

/* Karten */

.card{

background:white;

padding:15px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

cursor:pointer;

}

.card img{

width:100%;
height:140px;

object-fit:contain;

}

.name{

font-size:22px;

font-weight:700;

margin-top:8px;

}

/* Expertenbuttons */

.expertButton{

font-size:24px;

padding:25px;

background:#ea4335;

color:white;

border:none;

border-radius:15px;

cursor:pointer;

width:100%;

}

/* Punkte */

#points{

font-size:30px;

font-weight:700;

margin-top:20px;

}

/* Fortschrittsbalken */

.progressContainer{

width:80%;

height:30px;

margin:20px auto;

background:#ddd;

border-radius:30px;

overflow:hidden;

}

.progressBar{

height:100%;
width:0%;

background:#4285f4;

}

#info{

font-size:24px;

height:30px;

}

/* ===================== */
/* TABLET */
/* ===================== */

@media (max-width:1000px){

.container{
grid-template-columns:repeat(3,1fr);
}

.modeButton{
font-size:34px;
}

}

/* ===================== */
/* HANDY */
/* ===================== */

@media (max-width:700px){

.container{
grid-template-columns:repeat(2,1fr);
}

.modeButton{
font-size:24px;
padding:18px 30px;
}

.bigButton{
font-size:20px;
padding:14px 22px;
}

}

</style>

</head>

<body>

<!-- STARTSCREEN -->

<div id="startScreen">

<button class="modeButton learnBtn" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton quizBtn" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton expertBtn" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<!-- SPIEL -->

<div id="game" style="display:none;">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button> <button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<!-- ENDSCREEN -->

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

/* dein vorhandenes JavaScript bleibt unverändert */

</script>

</body>
</html>
