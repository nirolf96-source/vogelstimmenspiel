<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<style>

body{
font-family:"Segoe UI",Arial;
background:#eaeaea;
margin:0;
text-align:center;
}

/* Überschrift */

h1{
font-size:70px;
margin-top:30px;
}

/* Startseite */

#startScreen{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;

background-image:url("Startseiten.png");
background-size:cover;
background-position:center;
}

/* 3D Buttons */

.modeButton{

width:70%;
max-width:600px;
font-size:40px;
padding:40px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;

box-shadow:0 10px 0 rgba(0,0,0,0.25);

transition:0.15s;

}

.modeButton:active{
transform:translateY(5px);
box-shadow:0 5px 0 rgba(0,0,0,0.25);
}

.learnBtn{background:#2ecc71;}
.quizBtn{background:#3498db;}
.expertBtn{background:#e74c3c;}

/* Zurück Button */

.backButton{
font-size:30px;
padding:20px 40px;
margin-top:20px;
}

/* Container */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:35px;
width:95%;
margin:auto;
margin-top:40px;
}

/* Karten */

.card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
cursor:pointer;
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

/* Experten Buttons */

.expertButton{
font-size:36px;
padding:40px;
background:#e74c3c;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
width:100%;
}

/* Steuer Buttons */

button{
padding:20px 40px;
font-size:30px;
border:none;
border-radius:15px;
background:#333;
color:white;
cursor:pointer;
margin:10px;
}

/* Punkte */

#points{
font-size:40px;
font-weight:bold;
}

/* Fortschrittsbalken */

.progressContainer{
width:80%;
height:50px;
margin:20px auto;
background:#ddd;
border-radius:25px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#2ecc71;
}

/* Info */

#info{
font-size:32px;
height:40px;
}

/* Endscreen */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5f5f5;
justify-content:center;
align-items:center;
flex-direction:column;
}

#finalScore{
font-size:60px;
}

#nameInput{
font-size:26px;
padding:12px;
width:260px;
}

/* Konfetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(110vh) rotate(720deg);}
}

</style>

</head>

<body>

<h1>🐦 Vogelstimmen Trainer</h1>

<div id="startScreen">

<button class="modeButton learnBtn" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton quizBtn" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton expertBtn" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<div id="game" style="display:none;">

<button class="backButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button onclick="playRandomSound()">🔊 Vogelruf</button> <button onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button id="saveBtn" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- Audio -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

function capitalize(text){
return text.charAt(0).toUpperCase()+text.slice(1);
}

function launchConfetti(){

let colors=["#ff0000","#ffcc00","#00ccff","#66ff66","#ff66cc"];

for(let i=0;i<120;i++){

let conf=document.createElement("div");
conf.className="confetti";

conf.style.left=Math.random()*100+"vw";
conf.style.background=colors[Math.floor(Math.random()*colors.length)];

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),3000);

}

}

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;
let scoreSaved=false;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

if(mode==="learn"){
document.getElementById("quizElements").style.display="none";
}else{
document.getElementById("quizElements").style.display="block";
}

createBirdCards();

}

function goBack(){

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createBirdCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(bird=>{

let name=capitalize(bird.name);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(bird.name);
container.appendChild(btn);

}else{

let card=document.createElement("div");
card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+name+"</div>";
card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

}

});

}

function playRandomSound(){

let randomIndex=Math.floor(Math.random()*birds.length);
currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

}

function repeatSound(){

if(currentBird!=""){
document.getElementById(currentBird).play();
}

}

function birdClicked(bird){

rounds++;

if(bird===currentBird){
points++;
document.getElementById("info").innerHTML="✅ Richtig!";
}else{
document.getElementById("info").innerHTML="❌ Falsch";
}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;
document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){
endGame();
}

}

function endGame(){

launchConfetti();

document.getElementById("game").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Punkte: "+points+" / "+maxRounds;

displayHighscores();

}

function saveScore(){

if(scoreSaved) return;

let name=document.getElementById("nameInput").value.trim();
if(!name) return;

scoreSaved=true;

document.getElementById("saveBtn").disabled=true;

let key = mode==="expert" ? "birdHighscoresExpert" : "birdHighscoresQuiz";

let highscores=JSON.parse(localStorage.getItem(key)||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem(key,JSON.stringify(highscores));

displayHighscores();

}

function displayHighscores(){

let key = mode==="expert" ? "birdHighscoresExpert" : "birdHighscoresQuiz";

let highscores=JSON.parse(localStorage.getItem(key)||"[]");

let html="";

highscores.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h.name+" — "+h.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
