<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Quiz</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
background:linear-gradient(to bottom,#dff6e0,#ffffff);
margin:0;
}

h1{
font-size:42px;
color:#2d6a4f;
margin-top:20px;
}

#points{
font-size:26px;
margin:10px;
font-weight:bold;
}

button{
padding:18px 35px;
font-size:22px;
margin:15px;
border:none;
border-radius:14px;
background:#2d6a4f;
color:white;
cursor:pointer;
}

button:hover{
background:#1b4332;
}

/* GRID */

.container{

display:grid;
grid-template-columns:repeat(5,1fr);
gap:25px;

width:90%;
margin:auto;
margin-top:30px;

}

.card{

background:white;
padding:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.3s;

}

.card:hover{
transform:scale(1.05);
}

.card img{

width:100%;
max-width:220px;

border-radius:15px;

}

.name{
font-weight:bold;
margin-top:8px;
font-size:20px;
}

/* Tablet */

@media (max-width:1000px){

.container{
grid-template-columns:repeat(3,1fr);
}

}

/* Handy */

@media (max-width:600px){

.container{
grid-template-columns:repeat(2,1fr);
}

.card img{
max-width:200px;
}

}

/* Fortschrittsbalken */

.progressContainer{

width:70%;
height:35px;
margin:25px auto;
background:#ddd;
border-radius:20px;
overflow:hidden;

}

.progressBar{

height:100%;
width:0%;
background:#2d6a4f;

}

#info{
font-size:26px;
height:40px;
margin-top:10px;
font-weight:bold;
}

/* ENDSCREEN */

#endScreen{

display:none;
position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(#dff6e0,#ffffff);

justify-content:center;
align-items:center;

flex-direction:column;

z-index:1000;

overflow:auto;

}

#endScreen h2{

font-size:60px;
color:#2d6a4f;

}

#finalScore{

font-size:48px;
margin:20px;

}

#rating{

font-size:40px;
margin-bottom:20px;

}

#nameInput{

font-size:22px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
width:250px;

}

.highscore{

font-size:26px;
margin-top:20px;

}

.restartButton{

font-size:26px;
padding:20px 40px;
margin-top:30px;

}

</style>
</head>

<body>

<h1>Vogelstimmen Quiz 🐦</h1>

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button onclick="playRandomSound()">🔊 Vogelruf abspielen</button>
<button onclick="repeatSound()">🔁 Ton wiederholen</button>

<div id="info"></div>

<div class="container" id="birdContainer"></div>

<!-- ENDSCREEN -->

<div id="endScreen">

<h2>🎉 Spiel beendet! 🎉</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen-Highscore</h3>
<div id="highscores"></div>
</div>

<button class="restartButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio>
<audio id="amsel" src="amsel.mp3"></audio>
<audio id="rotkehlchen" src="rotkehlchen.mp3"></audio>
<audio id="halsbandsittich" src="halsbandsittich.mp3"></audio>
<audio id="kanadagans" src="kanadagans.mp3"></audio>
<audio id="kohlmeise" src="kohlmeise.mp3"></audio>
<audio id="ringeltaube" src="ringeltaube.mp3"></audio>
<audio id="star" src="star.mp3"></audio>
<audio id="stockente" src="stockente.mp3"></audio>
<audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;

createBirdCards();

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

}

function createBirdCards(){

let container=document.getElementById("birdContainer");

container.innerHTML="";

shuffle(birds);

birds.forEach(bird=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+bird.name+"</div>";

card.onclick=function(){

checkAnswer(bird.name);

};

container.appendChild(card);

});

}

function stopAllSounds(){

let sounds=document.querySelectorAll("audio");

sounds.forEach(sound=>{

sound.pause();
sound.currentTime=0;

});

}

function playRandomSound(){

stopAllSounds();

let randomIndex=Math.floor(Math.random()*birds.length);

currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

createBirdCards();

}

function repeatSound(){

if(currentBird!=""){

stopAllSounds();

document.getElementById(currentBird).play();

}

}

function updateProgress(){

let percent=(rounds/maxRounds)*100;

document.getElementById("progressBar").style.width=percent+"%";

}

function checkAnswer(bird){

if(currentBird===""){

document.getElementById("info").innerHTML="🔊 Erst Vogelruf starten!";

return;

}

rounds++;

if(bird===currentBird){

points++;

document.getElementById("info").innerHTML="✅ Richtig!";

}else{

document.getElementById("info").innerHTML="❌ Falsch";

}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

updateProgress();

if(rounds>=maxRounds){

endGame();

}

currentBird="";

}

function endGame(){

document.getElementById("birdContainer").style.display="none";

document.querySelectorAll("button").forEach(b=>b.style.display="none");

document.getElementById("info").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Deine Punkte: "+points+" / "+maxRounds;

let rating="";

if(points==15) rating="🏆 Vogelstimmen-Profi!";
else if(points>=13) rating="🐦 Fast ein Profi!";
else if(points>=10) rating="🌿 Gute Vogelkenntnisse!";
else if(points>=7) rating="🌱 Auf gutem Weg!";
else rating="🐣 Vogel-Einsteiger!";

document.getElementById("rating").innerHTML=rating;

displayHighscores();

}

/* Highscore speichern */

function saveScore(){

let name=document.getElementById("nameInput").value.trim();

if(name==="") return;

let highscores=JSON.parse(localStorage.getItem("birdHighscores")) || [];

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem("birdHighscores",JSON.stringify(highscores));

displayHighscores();

document.getElementById("nameInput").value="";

}

function displayHighscores(){

let highscores=JSON.parse(localStorage.getItem("birdHighscores")) || [];

let html="";

highscores.forEach((entry,index)=>{

let medal="";

if(index==0) medal="🥇";
else if(index==1) medal="🥈";
else if(index==2) medal="🥉";

html+=medal+" "+entry.name+" — "+entry.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
