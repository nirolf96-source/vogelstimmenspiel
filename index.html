<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background:#f0f0f0;
overflow-x:hidden;
}

/* STARTSEITE */

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;

background-image:url("Startseite.png");
background-size:cover;
background-position:center;
}

/* Startbuttons */

.modeButton{

width:auto;
min-width:220px;

font-size:38px;
font-weight:700;

padding:22px 45px;

border:none;
border-radius:25px;

color:white;
cursor:pointer;

box-shadow:
0 8px 0 rgba(0,0,0,0.35),
0 18px 25px rgba(0,0,0,0.4);

transition:all 0.15s ease;

}

.modeButton:active{
transform:translateY(6px);
}

.learnBtn{background:linear-gradient(#4cc76a,#2e9c47);}
.quizBtn{background:linear-gradient(#4d8dff,#2e62d6);}
.expertBtn{background:linear-gradient(#ff5c5c,#c72b2b);}

/* Steuerbuttons */

.bigButton{
font-size:26px;
padding:16px 28px;
border:none;
border-radius:15px;
background:#333;
color:white;
cursor:pointer;
margin:10px;
}

/* GRID */

.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(160px,1fr));

gap:20px;

max-width:1100px;

margin:auto;
margin-top:20px;

padding:10px;

}

/* Karten */

.card{

background:white;

padding:15px;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

cursor:pointer;

min-height:200px;

display:flex;
flex-direction:column;
justify-content:center;

}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

/* Vogelname */

.name{

font-size:18px;
font-weight:700;

margin-top:8px;

word-wrap:break-word;
overflow-wrap:break-word;

line-height:1.2;

text-align:center;

}

/* Expertenbuttons */

.expertButton{
font-size:22px;
padding:20px;
background:#ea4335;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
width:100%;
}

/* Punkte */

#points{
font-size:26px;
font-weight:700;
margin-top:10px;
}

/* Fortschrittsbalken */

.progressContainer{
width:80%;
height:25px;
margin:15px auto;
background:#ddd;
border-radius:30px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#4285f4;
}

#info{
font-size:22px;
height:30px;
}

/* Tablet */

@media (max-width:1000px){

.modeButton{
font-size:32px;
}

}

/* Handy */

@media (max-width:700px){

.modeButton{
font-size:24px;
padding:18px 30px;
}

.bigButton{
font-size:20px;
padding:12px 20px;
}

}

</style>

</head>

<body>

<!-- STARTSEITE -->

<div id="startScreen">

<button class="modeButton learnBtn" onclick="startGame('learn')">📚 Lernen</button>

<button class="modeButton quizBtn" onclick="startGame('quiz')">🎯 Quiz</button>

<button class="modeButton expertBtn" onclick="startGame('expert')">🔥 Expertenmodus</button>

</div>

<!-- SPIEL -->

<div id="game" style="display:none;">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button> <button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<!-- ENDSCREEN -->

<div id="endScreen" style="display:none;">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

function capitalize(text){
return text.charAt(0).toUpperCase()+text.slice(1);
}

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

if(mode==="learn"){
document.getElementById("quizElements").style.display="none";
}else{
document.getElementById("quizElements").style.display="block";
}

createBirdCards();

}

function goBack(){
stopAllSounds();
document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";
}

function createBirdCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(bird=>{

let name=capitalize(bird.name);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(bird.name);
container.appendChild(btn);

}else{

let card=document.createElement("div");
card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+name+"</div>";
card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

}

});

}

function stopAllSounds(){
document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});
}

function playRandomSound(){

stopAllSounds();

let randomIndex=Math.floor(Math.random()*birds.length);
currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

}

function repeatSound(){

if(currentBird!=""){
stopAllSounds();
document.getElementById(currentBird).play();
}

}

function birdClicked(bird){

stopAllSounds();

if(mode==="learn"){
document.getElementById(bird).play();
return;
}

if(currentBird===""){
document.getElementById("info").innerHTML="🔊 Erst Vogelruf starten!";
return;
}

rounds++;

if(bird===currentBird){
points++;
document.getElementById("info").innerHTML="✅ Richtig!";
}else{
document.getElementById("info").innerHTML="❌ Falsch";
}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;
document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){
endGame();
}

currentBird="";

}

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Punkte: "+points+" / "+maxRounds;

}

function saveScore(){

let name=document.getElementById("nameInput").value.trim();
if(!name) return;

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem("birdHighscores",JSON.stringify(highscores));

}

</script>

</body>
</html>
