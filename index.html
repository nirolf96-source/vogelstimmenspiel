<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:#f0f0f0;
}

/* STARTSEITE */

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:60px;

background-image:url("Startseite.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* 3D Buttons */

.startButton{

font-size:55px;
font-weight:700;
color:white;

padding:35px 80px;

border-radius:20px;
border:none;

cursor:pointer;

box-shadow:
0 10px 0 rgba(0,0,0,0.5),
0 14px 25px rgba(0,0,0,0.4);

transition:0.15s;

}

.startButton:active{
transform:translateY(6px);
box-shadow:0 3px 0 rgba(0,0,0,0.5);
}

.learnBtn{background:#2ecc71;}
.quizBtn{background:#3498db;}
.expertBtn{background:#e74c3c;}

/* GAME */

#game{
display:none;
padding-top:30px;
}

/* große Steuerbuttons */

.bigButton{

font-size:40px;
font-weight:700;

padding:30px 60px;

border-radius:18px;
border:none;

background:#444;
color:white;

cursor:pointer;

box-shadow:
0 8px 0 rgba(0,0,0,0.5),
0 12px 22px rgba(0,0,0,0.3);

margin:20px;

}

.bigButton:active{
transform:translateY(5px);
box-shadow:0 2px 0 rgba(0,0,0,0.5);
}

/* Karten */

.container{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:40px;
width:95%;
margin:auto;
margin-top:40px;

}

.card{

background:white;
padding:25px;

border-radius:20px;

box-shadow:0 12px 25px rgba(0,0,0,0.25);

cursor:pointer;

}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.name{
font-size:32px;
font-weight:700;
margin-top:10px;
}

/* Expertenbuttons */

.expertButton{

font-size:45px;
font-weight:700;

padding:50px;

border-radius:18px;
border:none;

background:#e74c3c;
color:white;

cursor:pointer;

box-shadow:
0 8px 0 rgba(0,0,0,0.5),
0 12px 22px rgba(0,0,0,0.3);

}

.expertButton:active{
transform:translateY(4px);
}

/* Punkte */

#points{

font-size:70px;
font-weight:700;

margin-top:20px;

}

/* Fortschrittsbalken */

.progressContainer{

width:90%;
height:80px;

background:#ddd;

border-radius:40px;

margin:30px auto;

overflow:hidden;

box-shadow:inset 0 5px 12px rgba(0,0,0,0.3);

}

.progressBar{

height:100%;
width:0%;

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* Info */

#info{
font-size:40px;
height:60px;
}

/* ENDSCREEN */

#endScreen{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(#f5f5f5,#eaeaea);

justify-content:center;
align-items:center;
flex-direction:column;

}

#finalScore{
font-size:100px;
font-weight:700;
margin:20px;
}

#motivation{
font-size:45px;
margin-bottom:30px;
color:#444;
}

#nameInput{

font-size:32px;
padding:18px;
width:320px;

border-radius:12px;
border:1px solid #ccc;

}

.highscore{
font-size:32px;
margin-top:30px;
}

</style>

</head>

<body>

<div id="startScreen">

<button class="startButton learnBtn" onclick="startGame('learn')">
Lernen
</button>

<button class="startButton quizBtn" onclick="startGame('quiz')">
Quiz
</button>

<button class="startButton expertBtn" onclick="startGame('expert')">
Expertenmodus
</button>

</div>

<div id="game">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button>

<button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<div id="finalScore"></div>

<div id="motivation"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button id="saveBtn" class="bigButton" onclick="saveScore()">
Score speichern
</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">
Nochmal spielen
</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

function capitalize(text){
return text.charAt(0).toUpperCase()+text.slice(1);
}

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;
let scoreSaved=false;
let soundPlayed=false;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

createBirdCards();

}

function goBack(){

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createBirdCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(bird=>{

let name=capitalize(bird.name);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(bird.name);

container.appendChild(btn);

}

else{

let card=document.createElement("div");
card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+name+"</div>";

card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

}

});

}

function stopAllSounds(){

document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});

}

function playRandomSound(){

stopAllSounds();

let randomIndex=Math.floor(Math.random()*birds.length);

currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

soundPlayed=true;

}

function repeatSound(){

if(currentBird!=""){
stopAllSounds();
document.getElementById(currentBird).play();
}

}

function birdClicked(bird){

if(!soundPlayed){
document.getElementById("info").innerHTML="🔊 Höre zuerst den Vogelruf!";
return;
}

stopAllSounds();

rounds++;

if(bird===currentBird){
points++;
document.getElementById("info").innerHTML="✅ Richtig!";
}
else{
document.getElementById("info").innerHTML="❌ Falsch";
}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

currentBird="";
soundPlayed=false;

if(rounds>=maxRounds){
endGame();
}

}

function endGame(){

document.getElementById("game").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="🏆 "+points+" / "+maxRounds;

let text="";

if(points==15) text="Unglaublich! Du bist ein echter Vogelstimmen-Profi! 🐦";
else if(points>=12) text="Stark! Du kennst dich richtig gut mit Vogelstimmen aus!";
else if(points>=9) text="Sehr gut! Du bist auf einem tollen Weg!";
else if(points>=6) text="Gut gemacht! Übung macht den Meister!";
else text="Weiter üben – bald erkennst du alle Vogelstimmen!";

document.getElementById("motivation").innerHTML=text;

displayHighscores();

}

function saveScore(){

if(scoreSaved) return;

let name=document.getElementById("nameInput").value.trim();

if(!name) return;

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem("birdHighscores",JSON.stringify(highscores));

scoreSaved=true;

document.getElementById("saveBtn").disabled=true;

displayHighscores();

}

function displayHighscores(){

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

let html="";

highscores.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h.name+" — "+h.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
