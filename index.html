<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ============================= */
/* BASIS */
/* ============================= */

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background-color:#f0f0f0;
background-image:url("https://www.transparenttextures.com/patterns/music.png");
transition:0.4s;
}

.learnMode{background:#dff5e3;}
.quizMode{background:#dfe9ff;}
.expertMode{background:#ffe0de;}

h1{
font-weight:700;
margin-top:40px;
}

/* ============================= */
/* STARTSCREEN */
/* ============================= */

#startScreen{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:50px;

background-image:url("fes.png");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
}

/* Startbuttons */

.modeButton{
border:none;
border-radius:35px;
color:white;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
font-family:'Poppins';
font-weight:700;
}

.learnBtn{background:#34a853;}
.quizBtn{background:#4285f4;}
.expertBtn{background:#ea4335;}

/* Steuerbuttons */

.bigButton{
border:none;
border-radius:20px;
background:#333;
color:white;
cursor:pointer;
font-family:'Poppins';
font-weight:700;
}

/* Container */

.container{
display:grid;
gap:40px;
width:90%;
margin:auto;
margin-top:40px;
}

/* Karten */

.card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
cursor:pointer;
}

.card img{
width:100%;
object-fit:contain;
}

.name{
font-weight:700;
}

/* Expertenbuttons */

.expertButton{
background:#ea4335;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-family:'Poppins';
font-weight:700;
width:100%;
}

/* Fortschrittsbalken */

.progressContainer{
margin:auto;
background:#ddd;
border-radius:30px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#4285f4;
}

/* Endscreen */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f0f0f0;
justify-content:center;
align-items:center;
flex-direction:column;
}

#nameInput{
border-radius:10px;
border:1px solid #ccc;
}

/* ============================= */
/* HANDY */
/* ============================= */

@media (max-width:600px){

h1{font-size:36px;}

.modeButton{
width:90%;
font-size:28px;
padding:30px;
}

.bigButton{
font-size:22px;
padding:15px 25px;
margin:10px;
}

.container{
grid-template-columns:1fr;
}

.card img{height:160px;}

.name{font-size:22px;}

.expertButton{
font-size:24px;
padding:20px;
}

#points{font-size:26px;}

.progressContainer{
height:25px;
width:90%;
}

#info{font-size:20px;}

#finalScore{font-size:38px;}
#rating{font-size:26px;}

#nameInput{
font-size:18px;
padding:10px;
width:200px;
}

}

/* ============================= */
/* TABLET (iPad) */
/* ============================= */

@media (min-width:601px) and (max-width:1100px){

h1{font-size:60px;}

.modeButton{
width:80%;
font-size:40px;
padding:50px;
}

.bigButton{
font-size:28px;
padding:20px 35px;
}

.container{
grid-template-columns:repeat(2,1fr);
}

.card img{height:200px;}

.name{font-size:26px;}

.expertButton{
font-size:32px;
padding:40px;
}

#points{font-size:36px;}

.progressContainer{
height:35px;
width:85%;
}

#info{font-size:26px;}

}

/* ============================= */
/* LAPTOP / PC */
/* ============================= */

@media (min-width:1101px) and (max-width:1800px){

h1{font-size:90px;}

.modeButton{
width:70%;
max-width:800px;
font-size:60px;
padding:80px;
}

.bigButton{
font-size:36px;
padding:30px 50px;
}

.container{
grid-template-columns:repeat(3,1fr);
}

.card img{height:240px;}

.name{font-size:32px;}

.expertButton{
font-size:44px;
padding:60px;
}

#points{font-size:46px;}

.progressContainer{
height:45px;
width:80%;
}

}

/* ============================= */
/* SMARTBOARD / BEAMER */
/* ============================= */

@media (min-width:1801px){

h1{font-size:120px;}

.modeButton{
width:60%;
font-size:90px;
padding:120px;
}

.bigButton{
font-size:60px;
padding:60px 80px;
}

.container{
grid-template-columns:repeat(4,1fr);
}

.card img{height:320px;}

.name{font-size:46px;}

.expertButton{
font-size:60px;
padding:100px;
}

#points{font-size:70px;}

.progressContainer{
height:70px;
width:70%;
}

#info{font-size:50px;}

}

</style>

</head>

<body>

<h1>🐦 Vogelstimmen Trainer</h1>

<div id="startScreen">

<button class="modeButton learnBtn" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton quizBtn" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton expertBtn" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<!-- SPIEL -->

<div id="game" style="display:none;">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button>

<button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<!-- ENDSCREEN -->

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<script>

/* Dein kompletter JavaScript Code bleibt unverändert */

</script>

</body>
</html>
