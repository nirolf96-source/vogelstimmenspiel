<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background-color:#f0f0f0;
background-image:url("https://www.transparenttextures.com/patterns/music.png");
}

/* Hintergrund je Modus */

.learnMode{background:#dff5e3;}
.quizMode{background:#dfe9ff;}
.expertMode{background:#ffe0de;}

/* STARTSEITE */

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
padding:20px;

background-image:url("Startseite.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* 3D Buttons */

.modeButton{

width:80%;
max-width:650px;

font-size:42px;
font-weight:700;

padding:40px;

border:none;
border-radius:25px;

color:white;

cursor:pointer;

transform:translateY(0);

box-shadow:
0 8px 0 rgba(0,0,0,0.35),
0 18px 25px rgba(0,0,0,0.4);

transition:all 0.15s ease;

}

.modeButton:active{

transform:translateY(6px);

box-shadow:
0 2px 0 rgba(0,0,0,0.35),
0 8px 15px rgba(0,0,0,0.4);

}

/* Buttonfarben */

.learnBtn{
background:linear-gradient(#4cc76a,#2e9c47);
}

.quizBtn{
background:linear-gradient(#4d8dff,#2e62d6);
}

.expertBtn{
background:linear-gradient(#ff5c5c,#c72b2b);
}

/* Steuerbuttons */

.bigButton{

font-family:'Poppins';

font-size:32px;

padding:25px 40px;

border:none;
border-radius:18px;

background:#333;
color:white;

cursor:pointer;

margin:15px;

}

/* Container */

.container{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

gap:35px;

width:92%;

margin:auto;

margin-top:30px;

}

/* Quizkarten */

.card{

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

cursor:pointer;

}

.card img{

width:100%;

height:220px;

object-fit:contain;

}

.name{

font-size:30px;

font-weight:700;

margin-top:10px;

}

/* Expertenbuttons */

.expertButton{

font-size:40px;

padding:50px;

background:#ea4335;

color:white;

border:none;

border-radius:20px;

cursor:pointer;

width:100%;

}

/* Punkte */

#points{

font-size:40px;

font-weight:700;

margin-top:20px;

}

/* Fortschrittsbalken */

.progressContainer{

width:80%;

height:45px;

margin:25px auto;

background:#ddd;

border-radius:30px;

overflow:hidden;

}

.progressBar{

height:100%;

width:0%;

background:#4285f4;

}

#info{

font-size:30px;

height:40px;

}

/* Endscreen */

#endScreen{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#f0f0f0;

justify-content:center;

align-items:center;

flex-direction:column;

}

#finalScore{

font-size:70px;

margin:20px;

}

#rating{

font-size:40px;

margin-bottom:20px;

}

#nameInput{

font-size:24px;

padding:12px;

border-radius:10px;

border:1px solid #ccc;

width:250px;

}

/* Mobile */

@media (max-width:800px){

.modeButton{

font-size:26px;

padding:22px;

width:90%;

}

.bigButton{

font-size:22px;

padding:18px;

}

.container{

grid-template-columns:1fr;

}

.card img{

height:170px;

}

}

</style>

</head>

<body>

<div id="startScreen">

<button class="modeButton learnBtn" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton quizBtn" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton expertBtn" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<div id="game" style="display:none;">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button>

<button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<script>

/* JavaScript bleibt unverändert */

</script>

</body>
</html>
