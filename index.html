<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<style>

body{
font-family:"Segoe UI",Arial;
background:linear-gradient(#e8f8e8,#ffffff);
margin:0;
text-align:center;
}

/* Titel */

h1{
font-size:64px;
margin-top:40px;
color:#2d6a4f;
letter-spacing:2px;
text-shadow:2px 2px 6px rgba(0,0,0,0.2);
}

/* STARTSCREEN */

#startScreen{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
}

.modeButton{

width:70%;
max-width:600px;

font-size:36px;

padding:40px;

border:none;

border-radius:25px;

background:#2d6a4f;

color:white;

cursor:pointer;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

}

.modeButton:hover{
background:#1b4332;
}

/* Zurück Button */

.backButton{
margin-top:20px;
font-size:24px;
padding:15px 30px;
}

/* GRID */

.container{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

gap:30px;

width:95%;

margin:auto;

margin-top:40px;

}

/* Karten */

.card{

background:white;

padding:20px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

cursor:pointer;

transition:0.3s;

}

.card:hover{
transform:scale(1.05);
}

.card img{

width:100%;

height:230px;

object-fit:contain;

}

/* Namen */

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* Buttons */

button{
padding:18px 40px;
font-size:24px;
border:none;
border-radius:15px;
background:#2d6a4f;
color:white;
cursor:pointer;
margin:10px;
}

/* Fortschrittsbalken */

.progressContainer{
width:80%;
height:40px;
margin:20px auto;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#2d6a4f;
}

/* Info */

#info{
font-size:28px;
height:40px;
}

/* Endscreen */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#e8f8e8,#ffffff);
justify-content:center;
align-items:center;
flex-direction:column;
}

#finalScore{
font-size:60px;
}

#rating{
font-size:42px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🐦 Vogelstimmen Trainer</h1>

<div id="startScreen">

<button class="modeButton" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<div id="game" style="display:none;">

<button class="backButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button onclick="playRandomSound()">🔊 Vogelruf</button> <button onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<button onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

if(mode==="learn"){
document.getElementById("quizElements").style.display="none";
}

createBirdCards();

}

function goBack(){

stopAllSounds();

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createBirdCards(){

let container=document.getElementById("birdContainer");

container.innerHTML="";

birds.forEach(bird=>{

let card=document.createElement("div");

card.className="card";

let img=bird.img;

if(mode==="expert"){
img="silhouette.png";
}

card.innerHTML="<img src='"+img+"'><div class='name'>"+bird.name+"</div>";

card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

});

}

function stopAllSounds(){

document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});

}

function playRandomSound(){

stopAllSounds();

let randomIndex=Math.floor(Math.random()*birds.length);

currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

}

function repeatSound(){

if(currentBird!=""){
stopAllSounds();
document.getElementById(currentBird).play();
}

}

function birdClicked(bird){

stopAllSounds();

if(mode==="learn"){
document.getElementById(bird).play();
return;
}

if(currentBird===""){
document.getElementById("info").innerHTML="🔊 Erst Vogelruf starten!";
return;
}

rounds++;

if(bird===currentBird){

points++;

document.getElementById("info").innerHTML="✅ Richtig!";

}else{

document.getElementById("info").innerHTML="❌ Falsch";

}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){
endGame();
}

currentBird="";

}

function endGame(){

document.getElementById("game").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Punkte: "+points+" / "+maxRounds;

let rating="";

if(points==15) rating="🏆 Vogelstimmen-Profi";
else if(points>=13) rating="🐦 Fast ein Profi";
else if(points>=10) rating="🌿 Gute Kenntnisse";
else if(points>=7) rating="🌱 Auf gutem Weg";
else rating="🐣 Anfänger";

document.getElementById("rating").innerHTML=rating;

}

</script>

</body>
</html>
