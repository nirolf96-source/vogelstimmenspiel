<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<style>

body{
font-family:"Segoe UI",Arial;
text-align:center;
background:linear-gradient(#dff6e0,#ffffff);
margin:0;
}

h1{
font-size:48px;
color:#2d6a4f;
margin-top:30px;
}

/* STARTSCREEN */

#startScreen{

margin-top:80px;

}

.modeButton{

font-size:30px;
padding:25px 50px;
margin:25px;

border:none;
border-radius:18px;

background:#2d6a4f;
color:white;

cursor:pointer;

}

.modeButton:hover{
background:#1b4332;
}

/* SPIEL */

#game{
display:none;
}

#points{
font-size:30px;
font-weight:bold;
margin:20px;
}

/* BUTTONS */

button{
padding:22px 45px;
font-size:26px;
margin:15px;
border:none;
border-radius:15px;
background:#2d6a4f;
color:white;
cursor:pointer;
}

/* GRID */

.container{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

gap:35px;

width:95%;
margin:auto;
margin-top:40px;

}

/* VOGELKARTEN */

.card{

background:white;

padding:20px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

cursor:pointer;

transition:0.3s;

}

.card:hover{
transform:scale(1.05);
}

/* WICHTIG: Bild vollständig anzeigen */

.card img{

width:100%;

height:auto;

max-height:230px;

object-fit:contain;

border-radius:15px;

}

.name{

font-size:22px;

font-weight:bold;

margin-top:10px;

}

/* Fortschrittsbalken */

.progressContainer{

width:85%;

height:50px;

margin:30px auto;

background:#ddd;

border-radius:25px;

overflow:hidden;

}

.progressBar{

height:100%;

width:0%;

background:#2d6a4f;

}

/* Info */

#info{
font-size:32px;
height:40px;
margin-top:10px;
font-weight:bold;
}

/* ENDSCREEN */

#endScreen{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(#dff6e0,#ffffff);

justify-content:center;
align-items:center;

flex-direction:column;

z-index:1000;

}

#finalScore{
font-size:56px;
margin:20px;
}

#rating{
font-size:44px;
margin-bottom:30px;
}

#nameInput{
font-size:26px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
width:260px;
}

.highscore{
font-size:28px;
margin-top:30px;
}

.restartButton{
font-size:28px;
padding:20px 45px;
margin-top:30px;
}

</style>

</head>

<body>

<h1>🐦 Vogelstimmen Trainer</h1>

<div id="startScreen">

<button class="modeButton" onclick="startGame('learn')">
📚 Lernen
</button>

<button class="modeButton" onclick="startGame('quiz')">
🎯 Quiz
</button>

<button class="modeButton" onclick="startGame('expert')">
🔥 Expertenmodus
</button>

</div>

<div id="game">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button onclick="playRandomSound()">🔊 Vogelruf abspielen</button> <button onclick="repeatSound()">🔁 Ton wiederholen</button>

<div id="info"></div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet! 🎉</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="restartButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<!-- AUDIO -->

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

createBirdCards();

}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function createBirdCards(){

let container=document.getElementById("birdContainer");

container.innerHTML="";

shuffle(birds);

birds.forEach(bird=>{

let card=document.createElement("div");
card.className="card";

let img=bird.img;

if(mode==="expert"){
img="silhouette.png";
}

card.innerHTML="<img src='"+img+"'><div class='name'>"+bird.name+"</div>";

card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

});

}

function stopAllSounds(){
document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});
}

function playRandomSound(){

stopAllSounds();

let randomIndex=Math.floor(Math.random()*birds.length);

currentBird=birds[randomIndex].name;

document.getElementById(currentBird).play();

}

function repeatSound(){

if(currentBird!=""){
stopAllSounds();
document.getElementById(currentBird).play();
}

}

function birdClicked(bird){

if(mode==="learn"){

document.getElementById(bird).play();
return;

}

if(currentBird===""){
document.getElementById("info").innerHTML="🔊 Erst Vogelruf starten!";
return;
}

rounds++;

if(bird===currentBird){

points++;
document.getElementById("info").innerHTML="✅ Richtig!";

}else{

document.getElementById("info").innerHTML="❌ Falsch";

}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){
endGame();
}

currentBird="";

}

function endGame(){

document.getElementById("game").style.display="none";

document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Deine Punkte: "+points+" / "+maxRounds;

let rating="";

if(points==15) rating="🏆 Vogelstimmen-Profi!";
else if(points>=13) rating="🐦 Fast ein Profi!";
else if(points>=10) rating="🌿 Gute Vogelkenntnisse!";
else if(points>=7) rating="🌱 Auf gutem Weg!";
else rating="🐣 Vogel-Einsteiger!";

document.getElementById("rating").innerHTML=rating;

displayHighscores();

}

function saveScore(){

let name=document.getElementById("nameInput").value.trim();

if(!name) return;

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem("birdHighscores",JSON.stringify(highscores));

displayHighscores();

}

function displayHighscores(){

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

let html="";

highscores.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h.name+" — "+h.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
