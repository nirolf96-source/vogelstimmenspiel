<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
text-align:center;
background:#f0f0f0;
overflow-x:hidden;
}

/* fliegende Vögel */

.bird{
position:fixed;
font-size:40px;
animation:fly 20s linear infinite;
opacity:0.5;
}

@keyframes fly{
0%{transform:translateX(-200px);}
100%{transform:translateX(120vw);}
}

/* Musiknoten */

.note{
position:absolute;
font-size:40px;
animation:noteUp 2s ease-out forwards;
}

@keyframes noteUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-120px);}
}

/* Konfetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(110vh) rotate(720deg);}
}

/* Modusfarben */

.learnMode{background:#dff5e3;}
.quizMode{background:#dfe9ff;}
.expertMode{background:#ffe0de;}

h1{
font-size:90px;
margin-top:40px;
}

/* Startscreen */

#startScreen{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;

background-image:url("fes.png");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
}

.startButton{
cursor:pointer;
transition:0.2s;
}

.startButton:hover{
transform:scale(1.05);
}

#topScore{
font-size:30px;
margin-bottom:20px;
}

/* große Steuerbuttons */

.bigButton{
font-size:40px;
padding:35px 60px;
border:none;
border-radius:20px;
background:#333;
color:white;
cursor:pointer;
margin:20px;
}

/* Container */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:40px;
width:90%;
margin:auto;
margin-top:40px;
}

/* Quizkarten */

.card{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
cursor:pointer;
}

.card img{
width:100%;
height:260px;
object-fit:contain;
}

.name{
font-size:34px;
font-weight:bold;
}

/* Expertenbuttons */

.expertButton{
font-size:52px;
padding:80px;
background:#ea4335;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
width:100%;
}

/* Punkte */

#points{
font-size:50px;
font-weight:bold;
}

/* Fortschrittsbalken */

.progressContainer{
width:85%;
height:55px;
margin:25px auto;
background:#ddd;
border-radius:30px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#4285f4;
}

#info{
font-size:36px;
height:50px;
}

/* Endscreen */

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f0f0f0;
justify-content:center;
align-items:center;
flex-direction:column;
}

#finalScore{
font-size:80px;
}

#rating{
font-size:50px;
}

#nameInput{
font-size:30px;
padding:15px;
width:300px;
}

.highscore{
font-size:28px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- fliegende Vögel -->

<div class="bird" style="top:10%;">🐦</div>
<div class="bird" style="top:30%; animation-delay:6s;">🕊</div>
<div class="bird" style="top:60%; animation-delay:12s;">🐦</div>

<h1>🐦 Vogelstimmen Trainer</h1>

<div id="startScreen">

<div id="topScore"></div>

<!-- Lernen -->

<div class="startButton" onclick="startGame('learn')">
<svg width="420" height="140">
<defs>
<linearGradient id="learnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#6EC1A5"/>
<stop offset="100%" stop-color="#1E6FB6"/>
</linearGradient>
</defs>

<rect x="10" y="10" rx="40" ry="40" width="400" height="120" fill="url(#learnGrad)"/>
<text x="210" y="80" font-size="38" fill="white" text-anchor="middle" font-weight="bold">
Lernen
</text>
</svg>
</div>

<!-- Quiz -->

<div class="startButton" onclick="startGame('quiz')">
<svg width="420" height="140">
<defs>
<linearGradient id="quizGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FFD34D"/>
<stop offset="100%" stop-color="#F59E0B"/>
</linearGradient>
</defs>

<rect x="10" y="10" rx="40" ry="40" width="400" height="120" fill="url(#quizGrad)"/>
<text x="210" y="80" font-size="38" fill="white" text-anchor="middle" font-weight="bold">
Quiz
</text>
</svg>
</div>

<!-- Expertenmodus -->

<div class="startButton" onclick="startGame('expert')">
<svg width="420" height="140">
<defs>
<linearGradient id="expertGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1E6FB6"/>
<stop offset="100%" stop-color="#D61F1F"/>
</linearGradient>
</defs>

<rect x="10" y="10" rx="40" ry="40" width="400" height="120" fill="url(#expertGrad)"/>
<text x="210" y="80" font-size="34" fill="white" text-anchor="middle" font-weight="bold">
Expertenmodus
</text>
</svg>
</div>

</div>

<div id="game" style="display:none;">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="playRandomSound()">🔊 Vogelruf</button> <button class="bigButton" onclick="repeatSound()">🔁 Wiederholen</button>

<div id="info"></div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<h2>🎉 Spiel beendet</h2>

<div id="finalScore"></div>
<div id="rating"></div>

<input id="nameInput" placeholder="Dein Name">

<br>

<button id="saveBtn" class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h3>🏆 Klassen Highscore</h3>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<script>

/* Konfetti */

function launchConfetti(){

let colors=["#ff0000","#ffcc00","#00ccff","#66ff66","#ff66cc"];

for(let i=0;i<120;i++){

let conf=document.createElement("div");
conf.className="confetti";

conf.style.left=Math.random()*100+"vw";
conf.style.background=colors[Math.floor(Math.random()*colors.length)];
conf.style.animationDuration=2+Math.random()*2+"s";

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),4000);

}

}

/* Musiknote */

function spawnNote(){

let note=document.createElement("div");
note.className="note";
note.innerHTML="🎵";

note.style.left=Math.random()*80+"vw";
note.style.top="60%";

document.body.appendChild(note);

setTimeout(()=>note.remove(),2000);

}

/* Highscore Startseite */

function showTopScore(){

let scores=JSON.parse(localStorage.getItem("birdHighscoresQuiz")||"[]");

if(scores.length>0){
document.getElementById("topScore").innerHTML=
"🏆 Klassenrekord: "+scores[0].name+" ("+scores[0].score+")";
}

}

showTopScore();

/* Hilfsfunktion */

function capitalize(text){
return text.charAt(0).toUpperCase()+text.slice(1);
}

let birds=[
{name:"nachtigall",img:"nachtigall.jpg"},
{name:"amsel",img:"amsel.jpg"},
{name:"rotkehlchen",img:"rotkehlchen.jpg"},
{name:"halsbandsittich",img:"halsbandsittich.jpg"},
{name:"kanadagans",img:"kanadagans.jpg"},
{name:"kohlmeise",img:"kohlmeise.jpg"},
{name:"ringeltaube",img:"ringeltaube.jpg"},
{name:"star",img:"star.jpg"},
{name:"stockente",img:"stockente.jpg"},
{name:"turmfalke",img:"turmfalke.jpg"}
];

let mode="quiz";
let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;
let scoreSaved=false;

function startGame(selectedMode){

mode=selectedMode;

document.body.classList.remove("learnMode","quizMode","expertMode");

if(mode==="learn"){document.body.classList.add("learnMode");}
if(mode==="quiz"){document.body.classList.add("quizMode");}
if(mode==="expert"){document.body.classList.add("expertMode");}

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

if(mode==="learn"){
document.getElementById("quizElements").style.display="none";
}else{
document.getElementById("quizElements").style.display="block";
}

createBirdCards();

}

function goBack(){
document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";
}

function createBirdCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(bird=>{

let name=capitalize(bird.name);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(bird.name);

container.appendChild(btn);

}else{

let card=document.createElement("div");
card.className="card";

card.innerHTML="<img src='"+bird.img+"'><div class='name'>"+name+"</div>";
card.onclick=()=>birdClicked(bird.name);

container.appendChild(card);

}

});

}

function playRandomSound(){

spawnNote();

let randomIndex=Math.floor(Math.random()*birds.length);
currentBird=birds[randomIndex].name;

}

function repeatSound(){}

function birdClicked(bird){

rounds++;

if(bird===currentBird){
points++;
document.getElementById("info").innerHTML="✅ Richtig!";
}else{
document.getElementById("info").innerHTML="❌ Falsch";
}

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;
document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

if(rounds>=maxRounds){
endGame();
}

}

function endGame(){

launchConfetti();

document.getElementById("game").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="Punkte: "+points+" / "+maxRounds;

displayHighscores();

}

function saveScore(){

if(scoreSaved) return;

let name=document.getElementById("nameInput").value.trim();
if(!name) return;

let key = mode==="expert" ? "birdHighscoresExpert" : "birdHighscoresQuiz";

let highscores=JSON.parse(localStorage.getItem(key)||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem(key,JSON.stringify(highscores));

scoreSaved=true;

document.getElementById("saveBtn").disabled=true;
document.getElementById("saveBtn").style.opacity=0.5;

displayHighscores();

}

function displayHighscores(){

let key = mode==="expert" ? "birdHighscoresExpert" : "birdHighscoresQuiz";

let highscores=JSON.parse(localStorage.getItem(key)||"[]");

let html="";

highscores.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h.name+" — "+h.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
